name: Commit Lint

on:
  push:
    branches:
      - main

jobs:
  check-commit:
    runs-on: self-hosted
    container:
      image: node:alpine

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Commitlint
        run: npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Lint Latest Commit Message
        run: |
          echo "${{ github.event.head_commit.message }}" | commitlint
