name: Renovate Bot
enable-email-notifications: true

on:
  schedule:
    # 21:30 UTC = 03:00 IST
    - cron: "30 21 * * *"
  # Allow manual triggers from the Codeberg Actions UI
  workflow_dispatch:

jobs:
  renovate:
    name: Renovate Bump PRs
    runs-on: self-hosted-dedicated

    container:
      image: ghcr.io/renovatebot/renovate@sha256:7d1ccd77a1a50dfbe949b55028d8c73763008b95e856044f2961b6b02a5790d0

    steps:
      - name: Run Renovate
        env:
          RENOVATE_PLATFORM: forgejo
          RENOVATE_ENDPOINT: https://codeberg.org/api/v1

          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_GH_TOKEN }}

          RENOVATE_AUTODISCOVER: "false"

          RENOVATE_REPOSITORIES: ${{ forgejo.repository }}

          LOG_LEVEL: info
        run: renovate
