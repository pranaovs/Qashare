name: Docs Check

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".forgejo/workflows/swagger-check.yml"
  pull_request:
    paths:
      - "server/**"
      - ".forgejo/workflows/swagger-check.yml"

jobs:
  ci:
    name: Check Docs Sync
    runs-on: self-hosted

    container:
      image: codeberg.org/pranaovs/go-ci:latest@sha256:4bc5f1737e12deb278bacb470bb3c85b731670b506e13e0991140f84b7e7e16c

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Swagger docs check
        working-directory: server
        run: |
          swag init --quiet
          if [ -n "$(git status --porcelain docs/)" ]; then
            echo "Error: Swagger documentation is out of sync with code changes."
            echo "Please run 'swag init' in the server directory locally and commit the result."
            git diff docs/
            exit 1
          fi
